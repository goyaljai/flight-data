name: Daily Massive Flight Scraper

on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the CSV back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Massive Scraper (630 API calls)
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scrape_all.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add massive_flight_dataset.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-Scrape: Daily 15-City Dataset Update"
          git push
